# cargo-deny policy for Barbican.
#
# Layered on top of `cargo audit` (advisories-only) to also enforce:
#   - license allow-list (no GPL/LGPL/AGPL/proprietary drift)
#   - duplicate-version awareness (warn, not deny — some dupes are
#     unavoidable across build-dep / normal-dep boundaries)
#   - registry + git source restrictions (crates.io only; no git
#     or unknown-registry deps)
#
# Run locally: `cargo deny check`
# Run in CI:   `.github/workflows/ci.yml` — `cargo deny` job.
#
# 1.6.x supply-chain audit finding M5: without this file, CI would
# only catch CVEs, not license or source drift from a future
# transitive-dep bump. This closes the gap.

[graph]
# Check all targets the release binary actually ships to.
targets = [
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-apple-darwin" },
    { triple = "aarch64-unknown-linux-gnu" },
    { triple = "x86_64-unknown-linux-gnu" },
]
# `all-features = true` so feature-gated deps (e.g. `test-support`)
# are included in the audit.
all-features = true

[advisories]
# cargo audit is the primary advisory gate (dedicated CI job with its
# own `--ignore` list). cargo-deny's advisory layer is redundant here;
# set to "warn" so accidental new advisories surface in the deny run
# without double-failing CI. The audit job is still the authoritative
# deny.
version = 2
yanked = "warn"
ignore = [
    # RUSTSEC-2026-0118: NSEC3 validation DoS in hickory-proto. We
    # don't enable any `dnssec-*` feature on hickory-resolver (only
    # `system-config` + `tokio`), so the vulnerable code path isn't
    # compiled. Documented in docs/SECURITY.md.
    "RUSTSEC-2026-0118",
]

[licenses]
# Every license the 1.6.x dep-graph survey found on transitive deps
# PLUS a small amount of headroom (MIT-0, MPL-2.0) for future additions.
# Reject everything else. A future dep that ships under a license not
# in this list fails CI loudly, forcing an explicit decision.
version = 2
allow = [
    # Core permissive set
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    # Public-domain-adjacent
    "Unlicense",
    "CC0-1.0",
    "MIT-0",
    # Unicode data (ICU4X et al. via hickory-resolver's IDNA path)
    "Unicode-3.0",
    # MPL — present-free today but future-proof the allow-list
    "MPL-2.0",
]
confidence-threshold = 0.93

# aws-lc-rs carries a composed "AND" expression that cargo-deny needs
# individual components of. Whitelist the specific crate since all
# constituent licenses are already in the `allow` list above.
[[licenses.clarify]]
crate = "aws-lc-sys"
expression = "ISC AND (Apache-2.0 OR ISC) AND Apache-2.0 AND MIT AND BSD-3-Clause AND (Apache-2.0 OR ISC OR MIT) AND (Apache-2.0 OR ISC OR MIT-0)"
license-files = []

[bans]
# Duplicate versions can silently double binary size. The 1.6.x audit
# found `core-foundation` 0.9/0.10 shipping together on macOS — worth
# knowing about but not always fixable (upstream `system-configuration`
# needs to bump). `warn` lets us see the list without gating the build.
multiple-versions = "warn"
# No specific crates are banned today. If a supply-chain incident
# forces us to reject a dep (or upgrade past a known-bad version),
# add it here.
deny = []

[sources]
# Refuse unknown registries outright — crates.io is the only
# legitimate source for Barbican's deps, and a git-direct dep or
# alternate-registry dep would be a supply-chain red flag.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
