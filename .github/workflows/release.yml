name: release

# Triggered when a `v*` tag is pushed. Builds release binaries for the
# platforms Claude Code runs on (macOS arm64/x86_64, Linux x86_64/arm64),
# computes SHA-256 checksums, and attaches everything to the GitHub
# release created from the tag.
#
# The release page itself is created manually (`gh release create v1.X.Y
# --title ... --notes ...`) — this workflow just adds binaries to it.
# Running on tag push (not release-published) lets us build before the
# release is marked published, so the assets are ready as soon as the
# release goes live.

on:
  push:
    tags:
      - 'v*'
  # Lets maintainers re-run the workflow manually if a tag push upload
  # fails transiently (GitHub API hiccup, rate limit, etc.) without
  # re-tagging.
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build (e.g. v1.3.6)"
        required: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  CARGO_INCREMENTAL: 0

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    # 1.3.7 adversarial review (Claude WARNING #1, #3): each job gets
    # the minimum permissions required. `build` only reads the repo
    # and produces artifacts; it has no release-write access.
    # `attach-to-release` holds `contents: write`.
    permissions:
      contents: read
    strategy:
      # One platform's build failure shouldn't block the others — the
      # release gets whatever assets succeed, and the maintainer can
      # re-run the workflow for missing platforms.
      fail-fast: false
      matrix:
        include:
          # 1.3.7 adversarial review (gemini-3.1-pro WARNING #2): pin
          # runner images to specific versions instead of `*-latest`
          # so an upstream runner rollout can't silently change the
          # release toolchain.
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04
    steps:
      # 1.3.7 adversarial review (Claude WARNING #2): SHA-pin every
      # third-party action to a tagged commit. Tag-only refs let an
      # attacker who compromises the action repository silently swap
      # the tag to a malicious commit. The `# v4.2.2` annotation is
      # the human-readable version for review.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          persist-credentials: false
          # Need `main`'s history for the ancestor check below.
          fetch-depth: 0

      # 1.3.7 adversarial review (Claude WARNING #3): `workflow_dispatch`
      # accepts a user-supplied `tag:` input. Without gating, a
      # collaborator with dispatch permission but no release-admin
      # permission could push a tag on an attacker-controlled branch,
      # dispatch the workflow, and exercise `build.rs` / `cargo
      # --locked` on an arbitrary commit with workflow-identity OIDC
      # tokens in reach. Require dispatched tags to be on `main`'s
      # history; the tag-push trigger path is already gated by repo
      # tag-write permissions, so this check is a no-op there.
      - name: Guard dispatched tag is on main
        if: github.event_name == 'workflow_dispatch'
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if ! git merge-base --is-ancestor "$(git rev-parse "$TAG")" origin/main; then
            echo "::error::dispatched tag $TAG is not an ancestor of origin/main; refusing to build" >&2
            exit 1
          fi

      - uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0 # v2.9.0
        with:
          shared-key: release-${{ matrix.target }}

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      # Linux aarch64 cross needs the aarch64 linker. The `cross` crate
      # would also work, but installing gcc-aarch64 is lighter and
      # avoids the nested-docker complexity.
      - name: Install aarch64 linker (Linux only)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          printf '[target.aarch64-unknown-linux-gnu]\nlinker = "aarch64-linux-gnu-gcc"\n' >> .cargo/config.toml

      - name: Release build
        # `--bins` packs every `[[bin]]` target: the main `barbican`
        # binary PLUS the 1.4.0 wrapper binaries (barbican-shell,
        # -python, -node, -ruby, -perl) that cargo auto-discovers
        # from src/bin/*.rs.
        run: cargo build --release --target ${{ matrix.target }} --locked --bins

      - name: Stage artifact
        id: stage
        run: |
          # Tag resolution: `github.ref_name` on tag push, the input on
          # workflow_dispatch. Strip the leading `v` for the filename.
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          ARTIFACT="barbican-${VERSION}-${{ matrix.target }}"
          STAGE_DIR="stage/$ARTIFACT"
          mkdir -p "$STAGE_DIR"

          BIN_DIR="target/${{ matrix.target }}/release"
          # Main binary.
          cp "$BIN_DIR/barbican" "$STAGE_DIR/barbican"
          # 1.4.0 wrapper binaries (`barbican install` copies these
          # alongside the main binary when present).
          for wrapper in barbican-shell barbican-python barbican-node barbican-ruby barbican-perl; do
            cp "$BIN_DIR/$wrapper" "$STAGE_DIR/$wrapper"
          done
          cp README.md LICENSE CHANGELOG.md docs/SECURITY.md "$STAGE_DIR/"

          # Pack as .tar.gz (same convention as rustup-init, fd, ripgrep,
          # etc.). No .zip — single-binary release, Unix-only users.
          tar -czf "${ARTIFACT}.tar.gz" -C stage "$ARTIFACT"

          # SHA-256 for the release notes and install-script verification.
          # `shasum` is portable across macOS + Ubuntu; `sha256sum` is
          # Linux-only.
          shasum -a 256 "${ARTIFACT}.tar.gz" > "${ARTIFACT}.tar.gz.sha256"

          echo "artifact_name=${ARTIFACT}" >> "$GITHUB_OUTPUT"
          echo "tarball=${ARTIFACT}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "checksum=${ARTIFACT}.tar.gz.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ steps.stage.outputs.artifact_name }}
          path: |
            ${{ steps.stage.outputs.tarball }}
            ${{ steps.stage.outputs.checksum }}
          if-no-files-found: error
          retention-days: 14

  attach-to-release:
    name: attach assets to release
    needs: build
    runs-on: ubuntu-24.04
    # Only runs after all matrix builds finish, and only when a release
    # already exists for the tag — otherwise `gh release upload` errors.
    # `if: always()` so a partial matrix still gets its successful
    # assets uploaded.
    if: always() && needs.build.result != 'cancelled'
    permissions:
      # `contents: write` is required for `gh release create` +
      # `gh release upload`. `id-token: write` + `attestations: write`
      # drive the build-provenance attestations (see attestation
      # step). `actions: write` is required for `gh workflow run`
      # (the tap-bump dispatch at the end of this job — 1.6.0 #70).
      # 1.3.7 adversarial review (Claude WARNING #1, #3).
      contents: write
      id-token: write
      attestations: write
      actions: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          persist-credentials: false

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts

      - name: Flatten artifacts for upload
        id: flatten
        run: |
          # Flatten: each matrix job uploads a directory with .tar.gz +
          # .sha256; we want flat files for the attestation step and
          # the release upload.
          mkdir -p flat
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.sha256" \) \
            -exec cp {} flat/ \;
          ls -la flat/

      # 1.3.7 adversarial review (Claude WARNING #1, gemini-3.1-pro
      # WARNING #2, grok-4-20-thinking SUGGESTION 1): the sha256
      # files verify transport integrity only — an attacker who
      # compromises the release can swap both tarball and sha256 in
      # one upload. Build-provenance attestations (Sigstore-backed,
      # keyless via GitHub OIDC) close the authenticity gap: users
      # run `gh attestation verify <tarball> --repo jdidion/barbican`
      # to confirm the artifact was produced by THIS workflow on a
      # commit that lives on THIS repository. No external key
      # material to rotate.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: "flat/*.tar.gz"

      - name: Create release from CHANGELOG if missing
        # 1.6.0 #70: previous flow required the maintainer to
        # `gh release create` before the release workflow's upload step
        # ran. This raced against tag push and caused every recent
        # release to need manual re-dispatch. Now the workflow itself
        # creates the release (notes pulled from the CHANGELOG section
        # matching the tag), attaches assets, and downstream workflows
        # (homebrew-tap bump) are dispatched at the end rather than
        # triggered by `release: published` mid-upload.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "release $TAG already exists; skipping create"
            exit 0
          fi

          # Extract the `## [VERSION] — ...` section from CHANGELOG.md
          # up to (but not including) the next `## [` heading. awk
          # handles this cleanly — stop printing when a new header
          # appears after we've already started.
          NOTES_FILE="$(mktemp)"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { printing = 1; next }
            printing && /^## \[/ { exit }
            printing { print }
          ' CHANGELOG.md > "$NOTES_FILE"

          if [ ! -s "$NOTES_FILE" ]; then
            echo "::error::no CHANGELOG section for [$VERSION] — add one before tagging" >&2
            exit 1
          fi

          # Use the first non-empty line of the extracted notes as a
          # basic sanity check. The full body goes into the release.
          echo "creating release $TAG with notes from CHANGELOG:"
          head -5 "$NOTES_FILE"
          echo "..."

          # Release title is just the tag. The CHANGELOG heading
          # format (`## [X.Y.Z] — YYYY-MM-DD`) carries the date, not a
          # descriptive suffix, so there's nothing useful to splice in.
          # If a maintainer wants a custom title, they can pre-create
          # the release (the `gh release view` check above short-
          # circuits when the release already exists).
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file "$NOTES_FILE"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          # --clobber so a re-run can overwrite a partial upload.
          gh release upload "$TAG" flat/* --clobber

      - name: Dispatch homebrew-tap bump
        # 1.6.0 #70: the tap workflow used to listen for
        # `release: published`, which fired immediately on
        # `gh release create` — before `gh release upload` had put
        # the .sha256 sidecars in place. The tap workflow would then
        # curl a 404 and fail. Now we dispatch it explicitly AFTER
        # the upload step has completed, guaranteeing assets are
        # live before the tap workflow runs.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          gh workflow run update-homebrew-tap.yml -f tag="$TAG"
