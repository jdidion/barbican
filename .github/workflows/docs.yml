name: docs

# Build the mdBook site from `book/` and deploy to GitHub Pages on
# every push to main. PRs build but don't deploy (so a doc-breaking
# PR is caught in CI before merge).

on:
  push:
    branches: [main]
    paths:
      - 'book/**'
      - 'CHANGELOG.md'
      - 'LICENSE'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main]
    paths:
      - 'book/**'
      - 'CHANGELOG.md'
      - 'LICENSE'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# GitHub Pages + OIDC deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time, but don't cancel a running one —
# the deploy step is idempotent and aborting mid-upload can leave the
# site wedged.
concurrency:
  group: pages
  cancel-in-progress: false

env:
  MDBOOK_VERSION: 0.4.40

jobs:
  build:
    name: build mdBook
    runs-on: ubuntu-24.04
    steps:
      # SHA-pinned to match the hardened release.yml pattern. See
      # docs/SECURITY.md for the rationale on tag-vs-SHA pinning for
      # third-party actions.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install mdBook
        run: |
          curl -sSfL \
            "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            -o mdbook.tar.gz
          tar -xzf mdbook.tar.gz
          chmod +x mdbook
          mkdir -p "$HOME/.local/bin"
          mv mdbook "$HOME/.local/bin/mdbook"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build book
        working-directory: book
        run: mdbook build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: book/book

  deploy:
    name: deploy to GitHub Pages
    needs: build
    # Only deploy on pushes to main, not on PRs.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
