name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Pin across the matrix — scaffold tracks a single pinned toolchain
# (rust-toolchain.toml). CI reads that file automatically.
env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUSTDOCFLAGS: -D warnings
  CARGO_INCREMENTAL: 0

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: cargo test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Test
        run: cargo test --all-targets --all-features

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: audit
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit
        run: cargo audit --deny warnings

  release-build:
    name: release build (aarch64-apple-darwin)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-aarch64
      - name: Add target
        run: rustup target add aarch64-apple-darwin
      - name: Release build
        run: cargo build --release --target aarch64-apple-darwin
      - name: Verify single static binary
        run: |
          BIN=target/aarch64-apple-darwin/release/barbican
          test -x "$BIN"
          file "$BIN"
          ls -lh "$BIN"
