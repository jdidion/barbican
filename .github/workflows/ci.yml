name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Pin across the matrix — scaffold tracks a single pinned toolchain
# (rust-toolchain.toml). CI reads that file automatically.
env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUSTDOCFLAGS: -D warnings
  CARGO_INCREMENTAL: 0

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0 # v2.9.0
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0 # v2.9.0
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: cargo test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0 # v2.9.0
      - name: Test
        run: cargo test --all-targets --all-features

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0 # v2.9.0
        with:
          shared-key: audit
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit
        # RUSTSEC-2026-0118: NSEC3 validation DoS in hickory-proto.
        # We do not enable any `dnssec-*` feature on hickory-resolver
        # (only `system-config` + `tokio`), so the vulnerable code path
        # isn't compiled into Barbican. Documented in SECURITY.md.
        run: cargo audit --deny warnings --ignore RUSTSEC-2026-0118

  linux-fuzz-repro:
    # Reproducer job for the Linux-only tree-sitter-bash SIGSEGV
    # finding from the 1.3.0 proptest layer. The parser-touching
    # properties in `tests/fuzz_properties.rs` are gated
    # `#[cfg(not(target_os = "linux"))]` because the first CI run
    # crashed with no diagnostics. This job runs a dedicated
    # Linux-only test file (`tests/linux_repro.rs`) that writes each
    # generated input to a log file + fsyncs BEFORE the parse call,
    # so a SIGSEGV leaves the triggering input on disk. The log is
    # uploaded as a workflow artifact; once we have the minimized
    # crasher, the fix lands red-test-first on a normal branch.
    #
    # `continue-on-error: true` — the whole point of this job is to
    # crash. A non-crash doesn't mean no bug; it just means this
    # run didn't hit the offending seed.
    name: linux fuzz repro (best-effort)
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      BARBICAN_LINUX_REPRO: "1"
      BARBICAN_REPRO_LOG: ${{ github.workspace }}/barbican-repro.txt
      BARBICAN_BISECT_LOG: ${{ github.workspace }}/barbican-bisect.txt
      # Widen proptest's per-test case count so a single job has a
      # realistic chance of tripping the crash. Default is 256.
      PROPTEST_CASES: "8192"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0 # v2.9.0
        with:
          shared-key: linux-fuzz-repro
      - name: Bisect the captured crasher (if one is pinned)
        # The bisect harness is in `tests/linux_crash_bisect.rs`. Tests
        # run serially (`--test-threads=1`) so the bisect log is
        # strictly-ordered and the last line of the log is the last
        # prefix length attempted before any crash.
        #
        # `|| true` so a crash here doesn't mask the subsequent
        # proptest repro step — we want both artifacts from the same
        # CI run.
        run: |
          cargo test --test linux_crash_bisect --release -- \
            --nocapture --test-threads=1 || true
      - name: Run the repro harness
        # The harness is in `tests/linux_repro.rs`. It's a normal
        # `#[test]` so regular `cargo test` picks it up, but the
        # file is `#![cfg(target_os = "linux")]` and each property
        # early-returns unless BARBICAN_LINUX_REPRO is lit, so this
        # never runs outside this job.
        run: cargo test --test linux_repro --release -- --nocapture
      - name: Report run outcome
        if: always()
        run: |
          echo "=== repro log ==="
          echo "size: $(wc -c < barbican-repro.txt 2>/dev/null || echo 0) bytes"
          echo "last 3 entries:"
          tail -n 3 barbican-repro.txt 2>/dev/null || echo "(log empty or missing)"
          echo ""
          echo "=== bisect log ==="
          echo "size: $(wc -c < barbican-bisect.txt 2>/dev/null || echo 0) bytes"
          echo "full contents:"
          cat barbican-bisect.txt 2>/dev/null || echo "(log empty or missing)"
      - name: Upload repro log
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: linux-fuzz-repro-log
          path: barbican-repro.txt
          if-no-files-found: warn
          retention-days: 14
      - name: Upload bisect log
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: linux-fuzz-bisect-log
          path: barbican-bisect.txt
          if-no-files-found: warn
          retention-days: 14

  release-build:
    name: release build (aarch64-apple-darwin)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0 # v2.9.0
        with:
          shared-key: release-aarch64
      - name: Add target
        run: rustup target add aarch64-apple-darwin
      - name: Release build
        run: cargo build --release --target aarch64-apple-darwin
      - name: Verify single static binary
        run: |
          BIN=target/aarch64-apple-darwin/release/barbican
          test -x "$BIN"
          file "$BIN"
          ls -lh "$BIN"
